server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmacy_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:your_jwt_secret_here}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/prescriptions

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Email / SMTP (Gmail) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Pharmacy contact details (used in emails)
pharmacy.email=nimmii0304@gmail.com
pharmacy.name=PharmaCare
pharmacy.phone=1800-PHARM
pharmacy.whatsapp=https://wa.me/919876543210

# Twilio SMS
twilio.account-sid=${TWILIO_ACCOUNT_SID:your_twilio_sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your_twilio_token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:your_twilio_phone}
twilio.enabled=true