server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmacy_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
# FIX: Removed explicit hibernate.dialect - Spring Boot 3.2 auto-detects it.
# Explicit MySQLDialect caused "scale has no meaning for floating point numbers"
# crash on startup due to Hibernate 6 incompatibility.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
# SECURITY: no insecure default — JWT_SECRET MUST be set via environment
# variable or application-local.properties (see application-local.properties.example).
# Generate one with: openssl rand -hex 32
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/prescriptions
file.medicine-image-dir=uploads/medicines

# CORS — comma-separated list of allowed frontend origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── Twilio SMS ───────────────────────────────────────────────────
# Sign up free at https://www.twilio.com → get these 3 values
twilio.account-sid=${TWILIO_ACCOUNT_SID:YOUR_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN:YOUR_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER:YOUR_PHONE_NUMBER}
# Set to true once you have real credentials
twilio.enabled=false

# ─── Email (Pharmacy contact notifications) ───────────────────────
# Optional. If spring.mail.host is left unset, EmailService skips sending
# emails (logs to console instead) and the app starts normally.
# To enable: set spring.mail.host/username/password (e.g. Gmail SMTP with
# an app password) via environment variables.
#spring.mail.host=${MAIL_HOST:smtp.gmail.com}
#spring.mail.port=${MAIL_PORT:587}
#spring.mail.username=${MAIL_USERNAME:}
#spring.mail.password=${MAIL_PASSWORD:}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

pharmacy.name=MediCare Pharmacy
pharmacy.email=${PHARMACY_EMAIL:support@medicarepharmacy.example}
pharmacy.phone=${PHARMACY_PHONE:1800-PHARMA}
pharmacy.whatsapp=${PHARMACY_WHATSAPP:https://wa.me/919876543210}
pharmacy.frontend-url=${FRONTEND_URL:http://localhost:5173}
